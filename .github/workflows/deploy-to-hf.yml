name: Deploy to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-to-hugging-face-space
  cancel-in-progress: true

jobs:
  deploy:
    name: Sync repository to Space
    runs-on: ubuntu-latest
    env:
      HF_SPACE_ID: build-small-hackathon/afri_farm_ai
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate Hugging Face configuration
        shell: bash
        run: |
          if [[ "${HF_SPACE_ID}" != build-small-hackathon/* ]]; then
            echo "::error::HF_SPACE_ID must belong to the build-small-hackathon organization."
            exit 1
          fi
          if [[ -z "${HF_TOKEN}" ]]; then
            echo "::error::Missing repository secret HF_TOKEN. Add a Hugging Face token with write access."
            exit 1
          fi

      - name: Sync to Hugging Face Space
        uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: ${{ env.HF_SPACE_ID }}
          hf_token: ${{ env.HF_TOKEN }}
          repo_type: space
          space_sdk: gradio
